name: Centralized Build and Deploy

on:
  workflow_dispatch: # Manual trigger
  repository_dispatch:
    types: [trigger-deploy] # Triggered by webhooks from backend/frontend repos

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set lower case owner name
        run: |
          echo "REPO_OWNER=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/focusblock-backend
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: './backend-source'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-source
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/focusblock-backend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/focusblock-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/focusblock-backend:buildcache,mode=max

  build-and-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set lower case owner name
        run: |
          echo "REPO_OWNER=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/focusblock-frontend
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: './frontend-source'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-source
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/focusblock-frontend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/focusblock-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/focusblock-frontend:buildcache,mode=max

  deploy:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch Env Vars from AWS SSM
        run: |
          aws ssm get-parameter --name "/focusblock/backend/ENV_VARS" --with-decryption --query "Parameter.Value" --output text > .env.backend
          aws ssm get-parameter --name "/focusblock/frontend/ENV_VARS" --with-decryption --query "Parameter.Value" --output text > .env.frontend

      - name: Copy docker-compose and env files to DO Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          source: "docker-compose.yml,nginx.conf,.env.backend,.env.frontend"
          target: "/opt/focusblock"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          script: |
            cd /opt/focusblock
            export REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr 'A-Z' 'a-z')
            
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af
